<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Weekly Records Viewer</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;margin:18px}
    h1{font-size:20px;margin-bottom:8px}
    table{border-collapse:collapse;width:100%;max-width:900px}
    th,td{border:1px solid #ddd;padding:8px;text-align:left}
    th{background:#f5f5f5}
    .note{color:#666;font-size:13px;margin-top:8px}
  </style>
</head>
<body>
  <h1>Последние рекорды (неделя)</h1>
  <div id="content">Загрузка…</div>
  <div class="note">Файл: <code>/data/latest.json</code></div>

  <script>
    (async function(){
      const container = document.getElementById('content');
      try {
        const res = await fetch('./data/latest.json', {cache: "no-store"});
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const rows = await res.json();
        if (!Array.isArray(rows) || rows.length === 0) {
          container.textContent = 'Данные не найдены.';
          return;
        }

        // Поля для отображения — поменяй, если нужно
        const columns = ['bestMoves','level','nickname','playerId'];

        // Собираем таблицу
        const table = document.createElement('table');
        const thead = document.createElement('thead');
        const htr = document.createElement('tr');
        columns.forEach(c => {
          const th = document.createElement('th');
          th.textContent = c;
          htr.appendChild(th);
        });
        thead.appendChild(htr);
        table.appendChild(thead);

        const tbody = document.createElement('tbody');
        rows.forEach(r => {
          const tr = document.createElement('tr');
          columns.forEach(c => {
            const td = document.createElement('td');
            let v = r[c];
            if (v === undefined) v = '';
            td.textContent = String(v);
            tr.appendChild(td);
          });
          tbody.appendChild(tr);
        });
        table.appendChild(tbody);

        container.innerHTML = '';
        container.appendChild(table);

      } catch (err) {
        container.textContent = 'Ошибка загрузки: ' + err.message;
        console.error(err);
      }
    })();
  </script>
</body>
</html>
