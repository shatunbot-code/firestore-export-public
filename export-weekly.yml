name: Weekly Firestore export

on:
  schedule:
    # каждое воскресенье в 00:00 UTC (GitHub cron использует UTC)
    - cron: '0 0 * * 0'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run weekly export
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SA }}
          COLLECTION: 'scores'
          TIMEZONE: 'Europe/Amsterdam'
        run: node exportWeekly.js

      - name: Commit and push exports
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json || true
          git commit -m "Weekly export $(date -u +'%Y-%m-%dT%H:%M:%SZ')" || echo "No changes to commit"
          git push origin HEAD
